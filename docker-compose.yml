version: '3.8'

services:
  tasktimer:
    build: .
    container_name: tasktimer
    restart: unless-stopped
    ports:
      - "3001:3001"          # Change left side to e.g. 8080:3001 if 3001 is taken on your NAS
    volumes:
      - ./data:/app/data     # SQLite database persists here — back this folder up
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/tasktimer.db
      - JWT_SECRET=CHANGE_THIS_TO_A_LONG_RANDOM_STRING_MINIMUM_32_CHARS
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/auth/me', r => process.exit(r.statusCode === 401 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
